<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museum Invitation</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <div class="doors-wrapper">
      <div id="leftDoor" class="door door-left">
        <div class="door-handle"></div>
      </div>
      <div id="rightDoor" class="door door-right">
        <div class="door-handle"></div>
      </div>
    </div>

    <div id="letter" class="letter">
      <div class="letter-inner">
        <button id="closeBtn" class="close-btn">&times;</button>
        <h2>Museum Date!</h2>
        <p id="message">I would love to invite you to a museum date at Pinto Art Museum on July 4, Saturday at 2pm!</p>
        <p id="message">-Hans Tuballa</p>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
